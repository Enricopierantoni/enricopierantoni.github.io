<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Enrico Pierantoni</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{
      background:#0e0e0e;
      color:#fff;
      font-family:"Inter",-apple-system,Helvetica,sans-serif;
      padding:7vh 22px 14vh;
    }
    a{color:#2b2b2b;text-decoration:none;}

    header{
      max-width:760px;margin:0 auto 10vh;
      display:flex;justify-content:space-between;align-items:baseline;gap:20px;
    }
    .back{
      font-size:.72rem;font-weight:500;color:#2b2b2b;
      text-shadow:0 0 2px rgba(255,255,255,.5);
    }
    h1{
      font-size:.64rem;font-weight:500;color:#fff;
      letter-spacing:.16em;text-transform:uppercase;
    }

    .works{max-width:760px;margin:0 auto;}

    .work{margin-bottom:12vh;}
    .work img,.work video{
      width:100%;height:auto;display:block;
      background:#1a1a1a;
    }
    .caption{
      margin-top:14px;
      font-size:.8rem;font-weight:500;
      line-height:1.7;
      color:#2b2b2b;
      text-shadow:
        -1px -1px 0 #000, 1px -1px 0 #000,
        -1px 1px 0 #000, 1px 1px 0 #000,
        0 0 3px rgba(0,0,0,.8);
    }
    .caption .d{font-weight:400;}
  </style>
</head>
<body>
  <header>
    <h1>Archive</h1>
    <a class="back" href="/">← back</a>
  </header>

  <div class="works">

    <div class="work">
      <video src="opera1.mp4.mp4" autoplay loop muted playsinline></video>
      <div class="caption">
        <span class="t">Titolo dell'opera</span><br>
        <span class="d">2026 — Datamosh / video — 00:12</span>
      </div>
    </div>

  </div>
</body>
</html>
